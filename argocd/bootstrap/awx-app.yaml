apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: awx-stack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/mahder05/mahder05-lab-automation.git
    targetRevision: HEAD
    path: infrastructure/operator  # Point this to the operator first
  destination:
    server: https://kubernetes.default.svc
    namespace: awx-mastery
  syncPolicy:
    automated:
      prune: true
      selfHeal: true