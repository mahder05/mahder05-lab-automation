apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# We point to the 'config/default' folder of the AWX Operator repo
resources:
  - github.com/ansible/awx-operator/config/default?ref=2.19.1

# This ensures everything stays in your mastery namespace
namespace: awx-mastery

# We need to tell Kustomize to allow remote lookups
buildMetadata: [managedByHelm]