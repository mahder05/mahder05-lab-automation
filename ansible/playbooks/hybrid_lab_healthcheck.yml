---
- name: Multi-OS Lab Healthcheck
  hosts: all
  gather_facts: true
  tasks:
    # --- WEB HEARTBEAT ---
    - name: Check Web Service (Linux)
      when: ansible_facts['os_family'] != "Windows"
      ansible.builtin.uri:
        url: "http://{{ ansible_host }}"
        method: GET
        status_code: [200, 301, 302]
      register: web_linux

    - name: Check Web Service (Windows)
      when: ansible_facts['os_family'] == "Windows"
      ansible.windows.win_uri:
        url: "http://{{ ansible_host }}"
        method: GET
        status_code: 200
      register: web_win

    # --- DISPLAY HEALTH SUMMARY ---
    - name: Display Health Summary
      ansible.builtin.debug:
        msg: 
          - "System: {{ inventory_hostname }} ({{ ansible_facts['distribution'] }} {{ ansible_facts['distribution_version'] }})"
          # This logic checks if the variable exists and has a status before looking at it
          - "Web Status: {{ 'UP' if (web_linux.status | default(0) == 200 or web_win.status | default(0) == 200) else 'DOWN' }}"
          - "Memory Free: {{ ansible_facts['memfree_mb'] if ansible_facts['os_family'] != 'Windows' else 'Checked via WinRM' }} MB"