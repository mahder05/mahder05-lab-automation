---
- name: Bootstrap Linux Credentials from Vault
  hosts: linux
  gather_facts: false
  become: false
  vars:
    vault_url: "http://vault.awx-mastery.svc.cluster.local:8200"

  tasks:
    - name: Fetch credentials using AppRole
      community.hashi_vault.vault_kv2_get:
        url: "{{ vault_url }}"
        path: "secret/lab/linux/{{ inventory_hostname }}"
        engine_mount_point: secret
        auth_method: approle
        role_id: "{{ vault_role_id }}"
        secret_id: "{{ vault_secret_id }}"
      register: vault_result
      delegate_to: localhost
      retries: 3
      delay: 5
      until: vault_result is not failed

    - name: Set connection facts
      set_fact:
        ansible_user: "{{ vault_result.data.data.ansible_user }}"
        ansible_password: "{{ vault_result.data.data.ansible_password }}"
        ansible_become_password: "{{ vault_result.data.data.ansible_password }}"

- name: Universal Linux Host Setup and Management
  hosts: linux
  become: true
  gather_facts: true
  vars:
    packages_common: [vim, curl, wget, net-tools]
    new_user: "labuser"
    new_user_password_hashed: "$6$rounds=656000$saltsalt$9.v0/v1L..." 

  tasks:
    - name: Display system information
      ansible.builtin.debug:
        msg:
          - "Hostname     : {{ ansible_facts['hostname'] }}"
          - "OS           : {{ ansible_facts['distribution'] }} {{ ansible_facts['distribution_version'] }}"
          - "IP Address   : {{ ansible_facts['all_ipv4_addresses'] | first }}"

    - name: Install common packages
      ansible.builtin.package:
        name: "{{ packages_common }}"
        state: present
      # Using 'package' module makes this OS-agnostic (handles apt/dnf automatically)

    - name: Ensure lab user exists
      ansible.builtin.user:
        name: "{{ new_user }}"
        password: "{{ new_user_password_hashed }}"
        groups: "{{ 'wheel' if ansible_facts['os_family'] == 'RedHat' else 'sudo' }}"
        append: true
        shell: /bin/bash
        state: present

    - name: Write custom motd banner
      ansible.builtin.copy:
        dest: /etc/motd
        content: |
          ############################################
          #   Managed by Ansible AWX - Hybrid Lab   #
          ############################################
        mode: "0644"