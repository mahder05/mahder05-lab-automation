---
- name: Cross-Platform License & Subscription Audit
  hosts: all
  gather_facts: true

  tasks:
    # --- WINDOWS: Using CIM Instance (The Modern Way) ---
    - name: Get Windows License Status
      win_shell: "Get-CimInstance -ClassName SoftwareLicensingProduct | Where-Object { $_.PartialProductKey } | Select-Object Description, LicenseStatus"
      register: windows_license
      when: ansible_facts['os_family'] == "Windows"

    # --- RHEL: Check Subscription ---
    - name: Get RHEL Subscription Status
      command: subscription-manager status
      register: rhel_subscription
      become: true
      when: ansible_facts['distribution'] == "RedHat"
      ignore_errors: true

    # --- UBUNTU: Check Pro Status ---
    - name: Get Ubuntu Pro Status
      command: pro status
      register: ubuntu_pro
      when: ansible_facts['distribution'] == "Ubuntu"
      ignore_errors: true

    # --- MAC: Hardware Serial ---
    - name: Get Mac Hardware Serial
      command: system_profiler SPHardwareDataType
      register: mac_serial
      when: ansible_facts['os_family'] == "Darwin"

    # --- FINAL COMPLIANCE REPORT ---
    - name: Display Compliance Report
      debug:
        msg: >
          {% if ansible_facts['os_family'] == "Windows" %}
          WINDOWS: {{ windows_license.stdout_lines | default('No Active License Found') }}
          {% elif ansible_facts['distribution'] == "RedHat" %}
          RHEL: {{ rhel_subscription.stdout_lines[0:3] | default('Not Registered') }}
          {% elif ansible_facts['distribution'] == "Ubuntu" %}
          UBUNTU: {{ ubuntu_pro.stdout_lines[0:5] | default('No Pro Status') }}
          {% elif ansible_facts['os_family'] == "Darwin" %}
          MAC: {{ mac_serial.stdout_lines | select('match', '.*Serial Number.*') | list }}
          {% endif %}