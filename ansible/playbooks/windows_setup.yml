---
- name: Windows Host Setup and Management
  hosts: windows
  gather_facts: false
  # No vars block needed - using environment variables from AWX

  tasks:
    - name: Dynamically fetch credentials from Vault
      include_vars: 
        file: ../vars/vault_lookup.yml
    
    # - name: Fetch Admin credentials via AppRole
    #   community.hashi_vault.vault_kv2_get:
    #     url: "{{ lookup('ansible.builtin.env', 'VAULT_ADDR') }}"
    #     role_id: "{{ lookup('ansible.builtin.env', 'VAULT_ROLE_ID') }}"
    #     secret_id: "{{ lookup('ansible.builtin.env', 'VAULT_SECRET_ID') }}"
    #     path: "lab/windows/{{ inventory_hostname }}"
    #     engine_mount_point: "secret"
    #     auth_method: "approle"
    #   register: win_vault
    #   delegate_to: localhost

    # - name: Configure WinRM connection facts
    #   set_fact:
    #     ansible_user: "{{ win_vault.data.data.username }}"
    #     ansible_password: "{{ win_vault.data.data.password }}"
    #     ansible_connection: winrm
    #     ansible_winrm_transport: basic
    #     ansible_winrm_port: 5985
    #     ansible_winrm_scheme: http
    #     ansible_winrm_server_cert_validation: ignore

    - name: Verify Connectivity to Windows Host
      ansible.windows.win_ping:

    - name: Install Chocolatey packages
      chocolatey.chocolatey.win_chocolatey:
        name: [googlechrome, notepadplusplus, 7zip, git]
        state: present

    - name: Ensure lab user exists
      ansible.windows.win_user:
        name: "labuser"
        password: "{{ win_vault.data.data.labuser_password | default('M4_Mastery_2026!') }}"
        state: present
        groups: ["Administrators"]

    - name: Set timezone to UTC
      ansible.windows.win_timezone:
        timezone: "UTC"

    - name: Write managed banner to Desktop
      ansible.windows.win_copy:
        content: "Managed by Ansible AWX - Lab 2026"
        dest: "C:\\Users\\Public\\Desktop\\managed_by_awx.txt"