---
- name: Windows Host Setup and Management
  hosts: windows
  gather_facts: false
  tasks:
    - name: Fetch Admin credentials via AppRole
      community.hashi_vault.vault_kv2_get:
        url: "{{ vault_url }}"
        path: "lab/windows/{{ inventory_hostname }}"
        engine_mount_point: secret
        auth_method: approle
        role_id: "{{ vault_role_id }}"
        secret_id: "{{ vault_secret_id }}"
      register: win_vault
      delegate_to: localhost

    - name: Configure WinRM connection facts
      set_fact:
        ansible_user: "{{ win_vault.data.data.ansible_user }}"
        ansible_password: "{{ win_vault.data.data.ansible_password }}"
        ansible_connection: winrm
        ansible_winrm_transport: basic
        ansible_winrm_port: 5985
        ansible_winrm_scheme: http
        ansible_winrm_server_cert_validation: ignore

    - name: Gather facts manually
      ansible.windows.setup:

    - name: Install Chocolatey packages
      chocolatey.chocolatey.win_chocolatey:
        name: [googlechrome, notepadplusplus, 7zip, git]
        state: present

    - name: Ensure lab user exists
      ansible.windows.win_user:
        name: "labuser"
        password: "{{ win_vault.data.data.labuser_password | default('M4_Mastery_2026!') }}"
        state: present
        groups: ["Administrators"]

    - name: Set timezone to UTC
      ansible.windows.win_timezone:
        timezone: "UTC"

    - name: Write managed banner to Desktop
      ansible.windows.win_copy:
        content: "Managed by Ansible AWX"
        dest: "C:\\Users\\Public\\Desktop\\managed_by_awx.txt"