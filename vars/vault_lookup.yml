---
# vault_lookup.yml
# Use environment variables injected by the AWX Custom Credential
v_role_id: "{{ lookup('env', 'VAULT_ROLE_ID') }}"
v_secret_id: "{{ lookup('env', 'VAULT_SECRET_ID') }}"
url: "{{ lookup('env', 'VAULT_ADDR') }}"

# Execute the lookup using 'secret' as the mount point
vault_kv2: "{{ lookup('community.hashi_vault.vault_kv2_get', 
                secret_path, 
                url=url, 
                engine_mount_point='secret',
                auth_method='approle',
                role_id=v_role_id,
                secret_id=v_secret_id) }}"

# Map the data to connection variables
ansible_user: "{{ vault_kv2.data.data.username }}"
ansible_password: "{{ vault_kv2.data.data.password }}"
ansible_become_password: "{{ vault_kv2.data.data.get('become_password', ansible_password) }}"