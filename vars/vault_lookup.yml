---
# This version explicitly authenticates using AppRole
vault_data: "{{ lookup('community.hashi_vault.vault_kv2_get', 
                secret_path, 
                url='http://vault.awx-mastery:8200', 
                engine_mount_point='secret',
                auth_method='approle',
                role_id=vault_role_id,
                secret_id=vault_secret_id).data.data }}"

ansible_user: "{{ vault_data['ansible_user'] }}"
ansible_password: "{{ vault_data['ansible_password'] }}"


