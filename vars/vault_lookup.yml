---
# This fetches the secret using the role_id and secret_id injected by AWX
vault_response: "{{ lookup('community.hashi_vault.vault_kv2_get', 
                secret_path, 
                url='http://vault-internal.awx-mastery.svc.cluster.local:8200', 
                engine_mount_point='secret',
                auth_method='approle',
                role_id=vault_role_id,
                secret_id=vault_secret_id) }}"

# Map the data to the variables Ansible uses for connections
ansible_user: "{{ vault_response.data.data.ansible_user }}"
ansible_password: "{{ vault_response.data.data.ansible_password }}"


# vault_kv2: "{{ lookup('community.hashi_vault.vault_kv2_get', secret_path, url=vault_url, auth_method='approle', role_id=vault_role_id, secret_id=vault_secret_id, engine_mount_point='secret').secret }}"

