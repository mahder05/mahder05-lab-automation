---
# We use 'default' to ensure the lookup doesn't attempt to login with empty strings
vault_role_id_env: "{{ lookup('env', 'VAULT_ROLE_ID') | default('', true) }}"
vault_secret_id_env: "{{ lookup('env', 'VAULT_SECRET_ID') | default('', true) }}"

vault_response: "{{ lookup('community.hashi_vault.vault_kv2_get', 
                vault_secret_path, 
                url='http://vault-internal.awx-mastery.svc.cluster.local:8200', 
                engine_mount_point='secrets',
                auth_method='approle',
                role_id=vault_role_id_env,
                secret_id=vault_secret_id_env) }}"

# Map the data to the variables Ansible uses for connections
ansible_user: "{{ vault_response.data.data.username }}"
ansible_password: "{{ vault_response.data.data.password }}"


# vault_kv2: "{{ lookup('community.hashi_vault.vault_kv2_get', secret_path, url=vault_url, auth_method='approle', role_id=vault_role_id, secret_id=vault_secret_id, engine_mount_point='secret').secret }}"

