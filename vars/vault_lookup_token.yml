---
# Connection Details
vault_url: "http://vault.awx-mastery.svc.cluster.local:8200"

# Token injected via AWX Environment Variable (VAULT_TOKEN)
v_token: "{{ lookup('env', 'VAULT_TOKEN') }}"

# The Lookup (Bypasses AppRole/Identity entirely)
vault_response: "{{ lookup('community.hashi_vault.vault_kv2_get', 
                vault_secret_path, 
                url=vault_url, 
                engine_mount_point='secrets',
                token=v_token) }}"

# Map the data to connection variables
ansible_user: "{{ vault_response.data.data.username }}"
ansible_password: "{{ vault_response.data.data.password }}"
ansible_become_password: "{{ vault_response.data.data.become_password | default(vault_response.data.data.password) }}"