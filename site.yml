---
- name: Infrastructure Reconciliation - Linux
  hosts: linux
  gather_facts: false

  tasks:
    - name: Fetch credentials using AppRole
      community.hashi_vault.vault_kv2_get:
        url: "{{ lookup('ansible.builtin.env', 'VAULT_ADDR') }}"
        role_id: "{{ lookup('ansible.builtin.env', 'VAULT_ROLE_ID') }}"
        secret_id: "{{ lookup('ansible.builtin.env', 'VAULT_SECRET_ID') }}"
        path: "lab/linux/{{ inventory_hostname }}"
        engine_mount_point: "secret"
        auth_method: "approle"
      register: vault_result
      delegate_to: localhost
      retries: 3
      delay: 5
      until: vault_result is not failed

    - name: Set connection facts
      set_fact:
        ansible_user: "{{ vault_result.data.data.username }}"
        ansible_password: "{{ vault_result.data.data.password }}"
        # Map the same password to become_password for sudo access
        ansible_become_password: "{{ vault_result.data.data.password }}"

      no_log: true

    - name: Establish Connection and Gather Facts
      ansible.builtin.setup:

    - name: Install Node Exporter (RedHat/Fedora)
      when: ansible_facts['os_family'] == "RedHat"
      become: true
      block:
        - name: Download Node Exporter Binary
          ansible.builtin.get_url:
            url: https://github.com/prometheus/node_exporter/releases/download/v1.8.2/node_exporter-1.8.2.linux-amd64.tar.gz
            dest: /tmp/node_exporter.tar.gz

        - name: Unpack Node Exporter
          ansible.builtin.unarchive:
            src: /tmp/node_exporter.tar.gz
            dest: /usr/local/bin
            remote_src: yes
            extra_opts: [--strip-components=1]
            exclude: ['*.md', 'LICENSE']

        - name: Create Node Exporter Systemd Service
          ansible.builtin.copy:
            dest: /etc/systemd/system/node_exporter.service
            content: |
              [Unit]
              Description=Node Exporter
              [Service]
              ExecStart=/usr/local/bin/node_exporter
              [Install]
              WantedBy=multi-user.target

    - name: Install Node Exporter (Debian/Ubuntu)
      ansible.builtin.package:
        name: prometheus-node-exporter
        state: present
      when: ansible_facts['os_family'] == "Debian"
      become: true

    - name: Ensure Node Exporter is Running
      ansible.builtin.service:
        name: "{{ 'node_exporter' if ansible_facts['os_family'] == 'RedHat' else 'prometheus-node-exporter' }}"
        state: started
        enabled: yes
        daemon_reload: yes
      become: true

- name: Infrastructure Reconciliation - Windows
  hosts: windows
  gather_facts: false

  tasks:
    - name: Fetch Admin credentials via AppRole
      community.hashi_vault.vault_kv2_get:
        url: "{{ lookup('ansible.builtin.env', 'VAULT_ADDR') }}"
        role_id: "{{ lookup('ansible.builtin.env', 'VAULT_ROLE_ID') }}"
        secret_id: "{{ lookup('ansible.builtin.env', 'VAULT_SECRET_ID') }}"
        path: "lab/windows/{{ inventory_hostname }}"
        engine_mount_point: "secret"
        auth_method: "approle"
      register: win_vault
      delegate_to: localhost

    - name: Configure WinRM connection facts
      set_fact:
        ansible_user: "{{ win_vault.data.data.username }}"
        ansible_password: "{{ win_vault.data.data.password }}"
        ansible_connection: winrm
        ansible_winrm_transport: basic
        ansible_winrm_port: 5985
        ansible_winrm_scheme: http
        ansible_winrm_server_cert_validation: ignore
      no_log: true

    - name: Verify Windows Connectivity
      ansible.windows.win_ping:

    - name: Create Windows Audit Folder
      ansible.windows.win_file:
        path: C:\GitOps_Audit
        state: directory

    - name: Install Windows Exporter via Chocolatey
      chocolatey.chocolatey.win_chocolatey:
        name: prometheus-windows-exporter.install
        state: present

    - name: Ensure Windows Exporter Service is Running
      ansible.windows.win_service:
        name: windows_exporter
        state: started
        start_mode: auto