---
- name: Infrastructure Reconciliation - Linux
  hosts: linux
  gather_facts: false

  tasks:
    - name: Fetch credentials using AppRole
      block:
        - name: Authenticate with Vault AppRole
          ansible.builtin.uri:
            url: "{{ lookup('ansible.builtin.env', 'VAULT_ADDR') }}/v1/auth/approle/login"
            method: POST
            body_format: json
            body:
              role_id: "{{ lookup('ansible.builtin.env', 'VAULT_ROLE_ID') }}"
              secret_id: "{{ lookup('ansible.builtin.env', 'VAULT_SECRET_ID') }}"
          register: approle_login
          delegate_to: localhost
          retries: 3
          delay: 5
          until: approle_login is not failed

        - name: Fetch secret from Vault
          ansible.builtin.uri:
            url: "{{ lookup('ansible.builtin.env', 'VAULT_ADDR')
              }}/v1/secret/data/lab/linux/{{ inventory_hostname }}"
            method: GET
            headers:
              X-Vault-Token: "{{ approle_login.json.auth.client_token }}"
          register: vault_result
          delegate_to: localhost
          retries: 3
          delay: 5
          until: vault_result is not failed
      rescue:
        - name: Fail if authentication or fetch fails
          ansible.builtin.fail:
            msg: "Failed to fetch credentials from Vault"

    - name: Set connection facts
      ansible.builtin.set_fact:
        # Standard SSH/Linux (Try removing one .data layer)
        ansible_user: "{{ vault_result.data.username }}"
        ansible_password: "{{ vault_result.data.password }}"
        ansible_become_password: "{{ vault_result.data.password }}"

        # Windows WinRM Specific
        ansible_winrm_user: "{{ vault_result.data.username }}"
        ansible_winrm_password: "{{ vault_result.data.password }}"
      no_log: false # Set to false temporarily ONLY to debug if it fails again

    - name: Establish Connection and Gather Facts
      ansible.builtin.setup:

    - name: Install Node Exporter (RedHat/Fedora)
      when: ansible_facts['os_family'] == "RedHat"
      become: true
      block:
        - name: Download Node Exporter Binary
          ansible.builtin.get_url:
            url: https://github.com/prometheus/node_exporter/releases/download/v1.8.2/node_exporter-1.8.2.linux-amd64.tar.gz
            dest: /tmp/node_exporter.tar.gz
            mode: "0644"

        - name: Unpack Node Exporter
          ansible.builtin.unarchive:
            src: /tmp/node_exporter.tar.gz
            dest: /usr/local/bin
            remote_src: true
            extra_opts: [ --strip-components=1 ]
            exclude: [ "*.md", "LICENSE" ]

        - name: Create Node Exporter Systemd Service
          ansible.builtin.copy:
            dest: /etc/systemd/system/node_exporter.service
            content: |
              [Unit]
              Description=Node Exporter
              [Service]
              ExecStart=/usr/local/bin/node_exporter
              [Install]
              WantedBy=multi-user.target
            mode: "0644"

    - name: Install Node Exporter (Debian/Ubuntu)
      ansible.builtin.package:
        name: prometheus-node-exporter
        state: present
      when: ansible_facts['os_family'] == "Debian"
      become: true

    - name: Ensure Node Exporter is Running
      ansible.builtin.service:
        name: "{{ 'node_exporter' if ansible_facts['os_family'] == 'RedHat' else
          'prometheus-node-exporter' }}"
        state: started
        enabled: true
        daemon_reload: true
      become: true

- name: Infrastructure Reconciliation - Windows
  hosts: windows
  gather_facts: false

  tasks:
    - name: Fetch Admin credentials via AppRole
      block:
        - name: Authenticate with Vault AppRole
          ansible.builtin.uri:
            url: "{{ lookup('ansible.builtin.env', 'VAULT_ADDR') }}/v1/auth/approle/login"
            method: POST
            body_format: json
            body:
              role_id: "{{ lookup('ansible.builtin.env', 'VAULT_ROLE_ID') }}"
              secret_id: "{{ lookup('ansible.builtin.env', 'VAULT_SECRET_ID') }}"
          register: approle_login
          delegate_to: localhost
          retries: 3
          delay: 5
          until: approle_login is not failed

        - name: Fetch secret from Vault
          ansible.builtin.uri:
            url: "{{ lookup('ansible.builtin.env', 'VAULT_ADDR')
              }}/v1/secret/data/lab/windows/{{ inventory_hostname }}"
            method: GET
            headers:
              X-Vault-Token: "{{ approle_login.json.auth.client_token }}"
          register: vault_result
          delegate_to: localhost
          retries: 3
          delay: 5
          until: vault_result is not failed
      rescue:
        - name: Fail if authentication or fetch fails
          ansible.builtin.fail:
            msg: "Failed to fetch credentials from Vault"

    - name: Configure WinRM connection facts
      ansible.builtin.set_fact:
        ansible_user: "{{ vault_result.data.data.username }}"
        ansible_password: "{{ vault_result.data.data.password }}"
        ansible_connection: winrm
        ansible_winrm_transport: basic
        ansible_winrm_port: 5985
        ansible_winrm_scheme: http
        ansible_winrm_server_cert_validation: ignore
      no_log: true

    - name: Verify Windows Connectivity
      ansible.windows.win_ping:

    - name: Create Windows Audit Folder
      ansible.windows.win_file:
        path: C:\GitOps_Audit
        state: directory

    - name: Install Windows Exporter via Chocolatey
      chocolatey.chocolatey.win_chocolatey:
        name: prometheus-windows-exporter.install
        state: present

    - name: Ensure Windows Exporter Service is Running
      ansible.windows.win_service:
        name: windows_exporter
        state: started
        start_mode: auto
