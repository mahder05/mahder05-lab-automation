---
- name: Setup NetBox Hybrid Lab
  hosts: localhost
  gather_facts: false
  
  vars:
    # ── Define your Inventory here ────────────────────────────────
    # This allows you to update one list and affect all tasks.
    linux_devices:
      - { name: mahder05-rhel10, ip: 10.211.55.5 }
      - { name: mahder05-ubuntu24-pro, ip: 10.211.55.7 }
      - { name: mahder05-fedora42, ip: 10.211.55.8 }
      - { name: mahder05-debian12, ip: 10.211.55.9 }
    
    windows_devices:
      - { name: MAHESHBABUDA391, ip: 10.211.55.3 }

  tasks:
    # ── 1. Fetch Credentials ───────────────────────────────────────
    - name: Fetch NetBox credentials from Vault
      community.hashi_vault.vault_kv2_get:
        url: "{{ vault_url }}"
        path: lab/netbox
        engine_mount_point: secret
        auth_method: approle
        role_id: "{{ vault_role_id }}"
        secret_id: "{{ vault_secret_id }}"
      register: netbox_vault

    - name: Set NetBox facts
      set_fact:
        nb_url: "{{ netbox_vault.secret['url'] | trim }}"
        nb_token: "{{ netbox_vault.secret['token'] | trim }}"

    # ── 2. Infrastructure Foundations ──────────────────────────────
    - name: Create site
      netbox.netbox.netbox_site:
        netbox_url: "{{ nb_url }}"
        netbox_token: "{{ nb_token }}"
        data:
          name: Hybrid Lab
          slug: hybrid-lab
          status: active
        state: present

    - name: Create device roles
      netbox.netbox.netbox_device_role:
        netbox_url: "{{ nb_url }}"
        netbox_token: "{{ nb_token }}"
        data:
          name: "{{ item.name }}"
          slug: "{{ item.slug }}"
          color: "{{ item.color }}"
        state: present
      loop:
        - { name: Linux Server, slug: linux-server, color: "00ff00" }
        - { name: Windows Server, slug: windows-server, color: "0000ff" }

    - name: Create manufacturer
      netbox.netbox.netbox_manufacturer:
        netbox_url: "{{ nb_url }}"
        netbox_token: "{{ nb_token }}"
        data:
          name: Virtual
          slug: virtual
        state: present

    - name: Create device type
      netbox.netbox.netbox_device_type:
        netbox_url: "{{ nb_url }}"
        netbox_token: "{{ nb_token }}"
        data:
          model: VM
          slug: vm
          manufacturer:
            slug: virtual
        state: present

    # ── 3. Create Devices (The Hardware/VM objects) ────────────────
    - name: Create All Devices
      netbox.netbox.netbox_device:
        netbox_url: "{{ nb_url }}"
        netbox_token: "{{ nb_token }}"
        data:
          name: "{{ item.name }}"
          device_type: { slug: vm }
          device_role: { slug: "{{ 'linux-server' if 'rhel' in item.name or 'ubuntu' in item.name or 'fedora' in item.name or 'debian' in item.name else 'windows-server' }}" }
          site: { slug: hybrid-lab }
          status: active
        state: present
      loop: "{{ linux_devices + windows_devices }}"

    # ── 4. Create Interfaces (The Sockets) ─────────────────────────
    - name: Create eth0 interfaces
      netbox.netbox.netbox_device_interface:
        netbox_url: "{{ nb_url }}"
        netbox_token: "{{ nb_token }}"
        data:
          device: "{{ item.name }}"
          name: "eth0"
          type: virtual
        state: present
      loop: "{{ linux_devices + windows_devices }}"

    # ── 5. Create & Assign IP Addresses (The Cabling) ──────────────
    - name: Create IP addresses and assign to Interfaces
      netbox.netbox.netbox_ip_address:
        netbox_url: "{{ nb_url }}"
        netbox_token: "{{ nb_token }}"
        data:
          address: "{{ item.ip }}/24"
          status: active
          assigned_object:
            device: "{{ item.name }}"
            name: "eth0"
        state: present
        # This tells the module to update the existing IP if it finds a match
        # instead of failing on a duplicate error.
        query_params:
          - address
      loop: "{{ linux_devices + windows_devices }}"

    # ── 6. Set Primary IP (The Finishing Touch) ────────────────────
    # This makes the IP appear in the main "Devices" table view.
    - name: Set Primary IPv4 for devices
      netbox.netbox.netbox_device:
        netbox_url: "{{ nb_url }}"
        netbox_token: "{{ nb_token }}"
        data:
          name: "{{ item.name }}"
          primary_ip4: "{{ item.ip }}/24"
        state: present
      loop: "{{ linux_devices + windows_devices }}"