---
- name: Generate inventory from NetBox
  hosts: localhost
  gather_facts: true
  connection: local

  vars:
    netbox_url: "http://localhost:8090"
    netbox_token: "netbox-api-token-lab-12345"

  tasks:
    - name: Fetch all active devices from NetBox
      ansible.builtin.uri:
        url: "{{ netbox_url }}/api/dcim/devices/?status=active&limit=100"
        headers:
          Authorization: "Token {{ netbox_token }}"
        method: GET
      register: netbox_devices

    - name: Fetch all IP addresses from NetBox
      ansible.builtin.uri:
        url: "{{ netbox_url }}/api/ipam/ip-addresses/?limit=100"
        headers:
          Authorization: "Token {{ netbox_token }}"
        method: GET
      register: netbox_ips

    - name: Build IP lookup dict
      set_fact:
        ip_lookup: "{{ ip_lookup | default({}) | combine({item.description: item.address | split('/') | first}) }}"
      loop: "{{ netbox_ips.json.results }}"
      when: item.description != ''

    - name: Separate Linux and Windows devices
      set_fact:
        linux_devices: "{{ netbox_devices.json.results | selectattr('role.slug', 'equalto', 'linux-server') | list }}"
        windows_devices: "{{ netbox_devices.json.results | selectattr('role.slug', 'equalto', 'windows-server') | list }}"

    - name: Generate hosts.yml
      ansible.builtin.template:
        src: templates/hosts.yml.j2
        dest: "{{ playbook_dir }}/../inventory/hosts.yml"
        mode: '0644'

    - name: Ensure host_vars directory exists
      ansible.builtin.file:
        path: "{{ playbook_dir }}/../inventory/host_vars"
        state: directory
        mode: '0755'

    - name: Generate host_vars for Linux devices
      ansible.builtin.template:
        src: templates/linux_host_vars.yml.j2
        dest: "{{ playbook_dir }}/../inventory/host_vars/{{ item.name }}.yml"
        mode: '0644'
      loop: "{{ linux_devices }}"

    - name: Generate host_vars for Windows devices
      ansible.builtin.template:
        src: templates/windows_host_vars.yml.j2
        dest: "{{ playbook_dir }}/../inventory/host_vars/{{ item.name }}.yml"
        mode: '0644'
      loop: "{{ windows_devices }}"
