---
- name: Fetch credentials from Vault
  hosts: windows
  gather_facts: false
  become: false

  tasks:
    - name: Fetch credentials from Vault
      community.hashi_vault.vault_kv2_get:
        url: "{{ vault_url }}"
        path: "lab/windows/{{ inventory_hostname }}"
        engine_mount_point: secret
        auth_method: approle
        role_id: "{{ vault_role_id }}"
        secret_id: "{{ vault_secret_id }}"
      register: vault_result
      delegate_to: localhost
      retries: 3
      delay: 5
      until: vault_result is not failed

    - name: Set credentials as host facts
      set_fact:
        ansible_user: "{{ vault_result.secret['username'] }}"
        ansible_password: "{{ vault_result.secret['password'] }}"
        ansible_winrm_transport: basic
        ansible_winrm_port: 5985
        ansible_winrm_scheme: http
        ansible_winrm_server_cert_validation: ignore
        ansible_winrm_operation_timeout_sec: 60
        ansible_winrm_read_timeout_sec: 70

- name: Windows Host Setup and Management
  hosts: windows
  gather_facts: true

  vars:
    chocolatey_packages:
      - googlechrome
      - notepadplusplus
      - 7zip
      - git
    new_user: "labuser"
    new_user_group: "Administrators"

  tasks:

    # ── Fetch labuser password from Vault ──────────────────────────
    - name: Fetch labuser password from Vault
      community.hashi_vault.vault_kv2_get:
        url: "{{ vault_url }}"
        path: "lab/windows/{{ inventory_hostname }}"
        engine_mount_point: secret
        auth_method: approle
        role_id: "{{ vault_role_id }}"
        secret_id: "{{ vault_secret_id }}"
      register: win_vault
      delegate_to: localhost

    - name: Set labuser password fact
      set_fact:
        new_user_password: "{{ win_vault.secret['labuser_password'] }}"

    # ── System Info ────────────────────────────────────────────────
    - name: Display system information
      ansible.builtin.debug:
        msg:
          - "Hostname     : {{ ansible_facts['hostname'] }}"
          - "OS           : {{ ansible_facts['distribution'] }} {{ ansible_facts['distribution_version'] }}"
          - "Architecture : {{ ansible_facts['architecture'] }}"
          - "IP Address   : {{ ansible_facts['ip_addresses'][0] }}"
          - "CPU Cores    : {{ ansible_facts['processor_count'] }}"
          - "Total RAM    : {{ ansible_facts['memtotal_mb'] }} MB"
          - "Free RAM     : {{ ansible_facts['memfree_mb'] }} MB"

    - name: Get disk info
      ansible.windows.win_shell: Get-PSDrive -PSProvider FileSystem | Select-Object Name, Used, Free
      register: disk_info
      changed_when: false

    - name: Show disk info
      ansible.builtin.debug:
        var: disk_info.stdout_lines

    # ── Install Software via Chocolatey ────────────────────────────
    - name: Ensure Chocolatey is installed
      chocolatey.chocolatey.win_chocolatey:
        name: chocolatey
        state: present
      failed_when: false

    - name: Install packages via Chocolatey
      chocolatey.chocolatey.win_chocolatey:
        name: "{{ chocolatey_packages }}"
        state: present
      failed_when: false

    - name: Upgrade all Chocolatey packages
      chocolatey.chocolatey.win_chocolatey:
        name: all
        state: present
      failed_when: false

    # ── User Management ────────────────────────────────────────────
    - name: Ensure lab user exists
      ansible.windows.win_user:
        name: "{{ new_user }}"
        password: "{{ new_user_password }}"
        state: present
        password_never_expires: true
        account_disabled: false

    - name: Add lab user to group
      ansible.windows.win_group_membership:
        name: "{{ new_user_group }}"
        members:
          - "{{ new_user }}"
        state: present

    # ── System Settings ────────────────────────────────────────────
    - name: Set timezone to UTC
      ansible.windows.win_timezone:
        timezone: "UTC"

    - name: Ensure WinRM is running
      ansible.windows.win_service:
        name: WinRM
        state: started
        start_mode: auto

    - name: Disable Windows Firewall (lab only)
      ansible.windows.win_firewall:
        state: disabled
        profiles:
          - Domain
          - Private
          - Public

    - name: Write custom welcome message to desktop
      ansible.windows.win_copy:
        content: |
          ############################################
          #   Managed by Ansible AWX - Hybrid Lab   #
          #   Unauthorized access is prohibited     #
          ############################################
        dest: "C:\\Users\\Public\\Desktop\\managed_by_awx.txt"