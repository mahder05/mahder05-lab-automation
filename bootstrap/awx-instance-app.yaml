apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: awx-instance
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/mahder05/mahder05-lab-automation.git
    targetRevision: HEAD
    path: instances/awx-mastery
  destination:
    server: https://kubernetes.default.svc
    namespace: awx-mastery
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
